<!DOCTYPE html>
<html>
<head>
    <title>Humphreys Hill Attend</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
    <div>
        <h1>Humphreys Hill Attend</h1>
        <p>Smart Attendance for Every Event</p>
    </div>
    <nav>
        <a href="{{ url_for('index') }}">Events</a>
        <a href="{{ url_for('new_event') }}">New Event</a>
        <a href="{{ url_for('scan') }}">Scan QR</a>
    </nav>
</header>

<main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alerts">
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
