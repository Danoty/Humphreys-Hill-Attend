{% extends "base.html" %}
{% block content %}
<section class="card">
<h2>Register Participant for {{ event.title }}</h2>
<form method="POST">
    <label>Full Name</label>
    <input name="full_name" required>

    <label>Email</label>
    <input type="email" name="email">

    <label>Phone</label>
    <input name="phone">

    <label>Organization</label>
    <input name="organization">

    <label>Position / Role</label>
    <input name="position">

    <button type="submit">Register and Generate QR</button>
</form>
</section>
{% endblock %}
