{% extends "base.html" %}
{% block content %}
<section class="card">
<h2>Scan / Enter QR Code</h2>
<p>For now, type or paste the QR value shown under the badge, for example: HHA-1-3.</p>

<form method="POST">
    <label>QR Code Value</label>
    <input name="qr_value" required placeholder="HHA-1-3">

    <label>Session Name</label>
    <input name="session_name" placeholder="Opening Session">

    <button type="submit">Check In</button>
</form>
</section>
{% endblock %}
