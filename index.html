<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | Humphreys Hill AttendPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#062c22">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  <section class="login-page">
    <div class="login-card">
      <div class="logo">HH</div>
      <h1>Humphreys Hill House</h1>
      <h2>AttendPro Login</h2>

      <label>Username
        <input id="username" value="admin" autocomplete="username">
      </label>

      <label>Password
        <input id="password" type="password" value="admin123" autocomplete="current-password">
      </label>

      <button id="loginBtn" class="primary">Login</button>

      <p id="loginMessage"></p>

      <div class="login-info">
        <b>Demo Accounts</b>
        <span>Admin: admin / admin123</span>
        <span>Scanner: scanner / scan123</span>
      </div>
    </div>
  </section>

  <script src="login.js"></script>
</body>
</html>
